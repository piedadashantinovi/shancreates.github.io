<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHAN | Creative Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- GLOBAL CONFIGURATION --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        body {
            background-color: #1a0813; /* Elegant deep burgundy backdrop */
            background-image: radial-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 0);
            background-size: 30px 30px;
            color: #e6dfd3;
            font-family: 'Quicksand', sans-serif;
            padding: 120px 0 40px 0; /* Top padding accommodates expansive fixed bar */
            display: flex;
            justify-content: center;
            overflow-x: hidden;
        }

        .portfolio-wrapper {
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            gap: 80px;
            padding: 0 30px;
        }

        /* --- EXPANDED TOP NAVIGATION TAB BAR --- */
        .modern-nav-bar {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 95%; /* Significantly expanded screen width usage */
            max-width: 1200px; /* Aligns with global page grids */
            background: rgba(26, 8, 19, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 50px; /* Sweeping, expansive pill shape */
            padding: 12px 40px; /* Generous breathing room inside the tab */
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
        }

        .nav-brand-logo {
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            font-size: 1.05rem;
            color: #f7d070;
            text-decoration: none;
            letter-spacing: 1px;
        }

        .nav-links-cluster {
            display: flex;
            gap: 10px;
        }

        .nav-tab-link {
            text-decoration: none;
            font-family: 'Fredoka', sans-serif;
            font-size: 0.88rem;
            font-weight: 600;
            color: #cbd5e1;
            padding: 10px 20px;
            border-radius: 30px;
            transition: all 0.25s ease;
        }

        .nav-tab-link:hover, .nav-tab-link.active-tab {
            color: #fff;
            background: #ec527b;
        }

        /* --- PORSCHE-INSPIRED SPLIT LANDING HERO --- */
        .hero-section {
            position: relative;
            background: linear-gradient(to right, #25101f 50%, #1a0813 50%); /* High-contrast clean split concept */
            border-radius: 24px;
            padding: 80px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 40px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        /* Massive Structural Watermark Typography */
        .hero-bg-watermark {
            position: absolute;
            font-family: 'Fredoka', sans-serif;
            font-size: 11rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.015);
            letter-spacing: 15px;
            line-height: 1;
            bottom: -20px;
            left: 5%;
            user-select: none;
            pointer-events: none;
            z-index: 1;
        }

        .logo-area {
            flex: 1;
            min-width: 300px;
            position: relative;
            z-index: 2;
        }

        .main-title {
            font-family: 'Fredoka', sans-serif;
            font-size: 4.5rem;
            line-height: 1;
            color: #ec527b; 
            font-weight: 700;
            text-shadow: 4px 4px 0px #fff;
            letter-spacing: -1px;
            margin-bottom: 12px;
        }

        .tagline {
            font-size: 1.3rem;
            font-style: italic;
            color: #f7d070; 
            margin-top: 8px;
            font-weight: 500;
        }

        /* Tech Visual Right Alignment Block */
        .tech-matrix-visual {
            width: 180px;
            height: 120px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            position: relative;
            flex-shrink: 0;
            z-index: 2;
        }

        .matrix-node {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .matrix-node.node-glow-pink {
            background: #ec527b;
            border-color: #fff;
            box-shadow: 0 0 20px rgba(236, 82, 123, 0.7);
        }

        .matrix-node.node-glow-gold {
            background: #f7d070;
            border-color: #fff;
            box-shadow: 0 0 20px rgba(247, 208, 112, 0.7);
        }

        .matrix-vector-line {
            position: absolute;
            width: 2px;
            background: linear-gradient(to bottom, #ec527b, #f7d070);
            top: 15%;
            bottom: 15%;
            left: 37%;
            z-index: -1;
            opacity: 0.3;
        }

        /* --- INTRODUCTION SECTION ASYMMETRIC GRID --- */
        .intro-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 50px;
            align-items: start;
        }

        @media(min-width: 850px) {
            .intro-grid { grid-template-columns: 320px 1fr; }
        }

        /* Polaroid Frame with Asymmetric Placement */
        .photo-frame {
            background: #f7d070;
            padding: 20px;
            border-radius: 4px; /* Shifting to premium angular geometry instead of heavy rounds */
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            transform: rotate(-3deg);
            transition: transform 0.4s ease;
        }

        .photo-frame:hover {
            transform: rotate(0deg) scale(1.02);
        }

        .profile-image {
            width: 100%;
            height: auto;
            display: block;
            border: 4px solid #fff;
        }

        .sticker {
            position: absolute;
            font-family: 'Fredoka', sans-serif;
            font-size: 0.85rem;
            font-weight: bold;
            padding: 6px 14px;
            border-radius: 30px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.2);
            border: 2px solid #fff;
        }
        .tag-blue { background: #5bc0be; color: #fff; bottom: 45px; left: -15px; transform: rotate(-8deg); }
        .tag-pink { background: #ec527b; color: #fff; bottom: 12px; right: -10px; transform: rotate(10deg); }

        /* --- UNBOXED SIDE PROFILE DETAILS PANEL --- */
        .connect-panel {
            margin-top: 50px;
            padding-left: 10px;
        }

        .connect-headline {
            font-family: 'Fredoka', sans-serif;
            font-size: 1.4rem;
            color: #f7d070;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
        }

        .connect-subtext {
            font-size: 0.9rem;
            line-height: 1.6;
            color: #cbd5e1;
            margin-bottom: 25px;
        }

        .contact-details-list {
            display: flex;
            flex-direction: column;
            gap: 18px;
            margin-bottom: 30px;
        }

        .contact-item-row {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .contact-meta-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #ec527b;
            font-weight: 700;
        }

        .contact-meta-value {
            font-size: 0.95rem;
            color: #fff;
            word-break: break-all;
        }

        .connect-action-btn {
            display: inline-block;
            width: 100%;
            text-align: center;
            background: #fff;
            color: #1a0813;
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            font-size: 0.95rem;
            padding: 14px 20px;
            border-radius: 30px;
            text-decoration: none;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 0px #cbd5e1;
            transition: all 0.15s ease;
        }

        .connect-action-btn:hover {
            transform: translateY(2px);
            box-shadow: 0 2px 0px #cbd5e1;
            background: #f7d070;
        }

        /* --- LUXURY UNBOXED BIO TYPOGRAPHY --- */
        .greet-title {
            font-family: 'Fredoka', sans-serif;
            font-size: 5.5rem;
            color: #f7d070;
            line-height: 1;
            margin-bottom: 20px;
        }

        .bio-text {
            font-size: 1.1rem;
            line-height: 1.75;
            color: #f1f5f9;
            text-align: justify;
        }
        
        .bio-text p {
            margin-bottom: 18px;
        }

        .divider {
            height: 1px;
            background: linear-gradient(to right, rgba(255,255,255,0.15), transparent);
            margin: 40px 0;
        }

        .section-subtitle {
            font-family: 'Fredoka', sans-serif;
            font-size: 1.8rem;
            color: #fff;
            margin-bottom: 20px;
        }

        .skills-row {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 35px;
        }

        .tool-badge {
            font-family: 'Fredoka', sans-serif;
            font-weight: 600;
            font-size: 0.95rem;
            padding: 8px 20px;
            border-radius: 30px;
            color: #1a0813;
            box-shadow: 0 4px 0px rgba(0,0,0,0.1);
        }
        .badge-video { background: #f8a488; }
        .badge-design { background: #a8dadc; }
        .badge-canva { background: #e9c46a; }
        .badge-capcut { background: #f4a261; }

        .personal-skills-zone {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
            margin-top: 30px;
        }

        @media(min-width: 600px) {
            .personal-skills-zone { grid-template-columns: 1fr 1fr; }
        }

        .skill-col h4 {
            font-family: 'Fredoka', sans-serif;
            color: #f7d070;
            margin-bottom: 12px;
            font-size: 1.2rem;
        }

        .skill-col ul {
            list-style-position: inside;
            color: #cbd5e1;
            font-size: 1rem;
            line-height: 1.7;
        }

        /* --- 3D DECK CARDS INTERACTIVE SLIDER --- */
        .experience-section {
            width: 100%;
            padding: 40px 0;
            perspective: 1200px;
        }

        .section-title-center {
            font-family: 'Fredoka', sans-serif;
            font-size: 2.4rem;
            color: #f7d070;
            margin-bottom: 40px;
            text-align: center;
        }

        .cards-slider-container {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            height: 400px;
            overflow: hidden;
            touch-action: pan-y;
        }

        .project-card-3d {
            position: absolute;
            width: 320px;
            height: 370px;
            background: #2b1424;
            border-radius: 20px;
            padding: 28px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.6s ease, border-color 0.3s ease;
            cursor: pointer;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            user-select: none;
        }

        .project-card-3d.card-pos-active {
            transform: translate3d(0, 0, 0) scale(1) rotateY(0deg);
            z-index: 5;
            opacity: 1;
            border-color: #ec527b;
            box-shadow: 0 20px 45px rgba(236, 82, 123, 0.25);
        }

        .project-card-3d.card-pos-left {
            transform: translate3d(-180px, 0, -150px) scale(0.85) rotateY(30deg);
            z-index: 3;
            opacity: 0.3;
        }

        .project-card-3d.card-pos-right {
            transform: translate3d(180px, 0, -150px) scale(0.85) rotateY(-30deg);
            z-index: 3;
            opacity: 0.3;
        }

        .project-card-3d.card-pos-hidden {
            transform: translate3d(0, 0, -250px) scale(0.7);
            z-index: 1;
            opacity: 0;
            pointer-events: none;
        }

        .card-top-identity h4 {
            font-family: 'Fredoka', sans-serif;
            font-size: 1.35rem;
            color: #fff;
            line-height: 1.3;
            margin-bottom: 6px;
        }

        .role-badge-text {
            font-size: 0.75rem;
            color: #ec527b;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .card-desc-body {
            font-size: 0.9rem;
            line-height: 1.55;
            color: #cbd5e1;
            text-align: justify;
            margin: 16px 0;
            flex-grow: 1;
        }

        .card-footer-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(255,255,255,0.06);
            padding-top: 14px;
        }

        .tech-pill-tag {
            font-size: 0.75rem;
            font-weight: 700;
            background: rgba(255,255,255,0.05);
            padding: 4px 12px;
            border-radius: 6px;
            color: #f7d070;
        }

        .project-year-stamp {
            font-size: 0.85rem;
            font-weight: bold;
            color: #cbd5e1;
        }

        /* --- HOBBIES & EDITORIAL INTERESTS --- */
        .interests-section {
            padding: 40px 0;
        }

        .interests-canvas-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 35px;
            margin-top: 20px;
        }

        @media(min-width: 850px) {
            .interests-canvas-grid {
                grid-template-columns: 1.3fr 1fr;
            }
        }

        .tech-bento-subgrid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media(min-width: 550px) {
            .tech-bento-subgrid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .interest-scrap-card {
            background: #23111e;
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.25);
            transition: all 0.3s ease;
        }

        .interest-scrap-card:hover {
            transform: translateY(-4px);
            border-color: rgba(236, 82, 123, 0.4);
        }

        .profile-design { border-bottom: 4px solid #f8a488; }
        .profile-ai { border-bottom: 4px solid #a8dadc; }
        .profile-web { border-bottom: 4px solid #e9c46a; }
        .profile-systems { border-bottom: 4px solid #5bc0be; }

        .interest-scrap-card h4 {
            font-family: 'Fredoka', sans-serif;
            font-size: 1.2rem;
            color: #fff;
            margin-bottom: 8px;
        }

        .interest-scrap-card p {
            font-size: 0.9rem;
            color: #cbd5e1;
            line-height: 1.55;
            text-align: justify;
        }

        /* Gaming Premium Frame panel */
        .gaming-deluxe-panel {
            background: linear-gradient(145deg, #1e0916, #280d1e);
            border: 1px solid rgba(247, 208, 112, 0.2);
            border-radius: 20px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            position: relative;
        }

        .gaming-deluxe-panel::before {
            content: 'TACTICAL MATRIX';
            position: absolute;
            top: -12px;
            right: 25px;
            background: #f7d070;
            color: #1a0813;
            font-family: 'Fredoka', sans-serif;
            font-size: 0.7rem;
            font-weight: 900;
            padding: 4px 10px;
            border-radius: 4px;
            letter-spacing: 1px;
        }

        .gaming-deluxe-header h3 {
            font-family: 'Fredoka', sans-serif;
            font-size: 1.6rem;
            color: #f7d070;
            margin-bottom: 8px;
        }

        .gaming-deluxe-header p {
            font-size: 0.95rem;
            color: #cbd5e1;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .gamer-tags-stack {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .gamer-tag-strip {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 16px 20px;
            border-radius: 12px;
            font-family: 'Fredoka', sans-serif;
            font-weight: 600;
            color: #fff;
            font-size: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.25s ease;
        }

        .gamer-tag-strip::after {
            content: 'READY';
            font-size: 0.65rem;
            color: #ec527b;
            font-weight: 700;
            border: 1px solid rgba(236, 82, 123, 0.3);
            padding: 3px 8px;
            border-radius: 4px;
            letter-spacing: 0.5px;
        }

        .gamer-tag-strip:hover {
            background: rgba(236, 82, 123, 0.06);
            border-color: rgba(236, 82, 123, 0.4);
            transform: translateX(4px);
        }

        /* --- PREMIUM BENTO GALLERY AWARDS --- */
        .awards-section {
            padding: 40px 0;
        }

        .bento-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
            margin-top: 30px;
        }

        @media(min-width: 750px) {
            .bento-grid {
                grid-template-columns: 1.2fr 1fr;
            }
            .trophy-card {
                grid-row: span 2;
                height: 100%;
            }
        }

        .bento-card {
            border-radius: 20px;
            padding: 30px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-height: 240px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            background-size: cover;
            background-position: center;
        }

        .bento-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(236, 82, 123, 0.2);
            border-color: rgba(236, 82, 123, 0.5) !important;
        }

        .trophy-card { border: 2px solid #f7d070; }
        .standard-bento { border: 1px solid rgba(255, 255, 255, 0.08); }
        
        .trophy-card::after {
            content: '';
            position: absolute;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(247, 208, 112, 0.08), transparent, rgba(236, 82, 123, 0.12), transparent);
            animation: rotateAura 15s linear infinite;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes rotateAura {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .bento-content-inner {
            position: relative;
            z-index: 2;
        }

        .bento-tag {
            font-family: 'Fredoka', sans-serif;
            font-size: 0.75rem;
            font-weight: bold;
            padding: 4px 12px;
            border-radius: 30px;
            display: inline-block;
            margin-bottom: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .tag-gold { background: #f7d070; color: #1a0813; }
        .tag-purple { background: #8e44ad; color: #fff; }
        .tag-red { background: #e74c3c; color: #fff; }

        .bento-card h3 {
            font-family: 'Fredoka', sans-serif;
            font-size: 1.5rem;
            color: #fff;
            line-height: 1.3;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .bento-card p {
            font-size: 0.92rem;
            color: #e2e8f0;
            line-height: 1.6;
            text-shadow: 0 1px 3px rgba(0,0,0,0.6);
        }

        .bento-footer-row {
            margin-top: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 2;
        }

        .bento-institution {
            font-size: 0.78rem;
            font-weight: 700;
            color: #ec527b;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            background: rgba(26, 8, 19, 0.8);
            padding: 4px 10px;
            border-radius: 6px;
        }

        .view-badge-btn {
            font-size: 0.8rem;
            background: rgba(255, 255, 255, 0.12);
            padding: 6px 14px;
            border-radius: 20px;
            transition: all 0.2s ease;
            backdrop-filter: blur(4px);
            font-weight: bold;
            color: #e6dfd3;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .bento-card:hover .view-badge-btn {
            background: #ec527b;
            color: #fff;
        }

        /* --- LIGHTBOX OVERLAY --- */
        .credential-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 4, 11, 0.96);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        .modal-container {
            max-width: 750px;
            width: 100%;
            background: #2b1424;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.08);
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            position: relative;
            transform: scale(0.95);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .credential-modal.modal-open { display: flex; }
        .credential-modal.modal-open .modal-container { transform: scale(1); }

        .modal-close-btn {
            position: absolute;
            top: 20px; right: 20px;
            background: #ec527b;
            color: white;
            border: none;
            width: 40px; height: 40px;
            border-radius: 50%;
            font-size: 1.4rem;
            font-weight: bold;
            cursor: pointer;
            z-index: 10;
            transition: background 0.2s;
        }
        .modal-close-btn:hover { background: #ba3559; }

        .modal-image-view {
            width: 100%;
            height: auto;
            max-height: 480px;
            object-fit: contain;
            background: #11030c;
            display: block;
        }

        .modal-caption {
            padding: 25px;
            text-align: center;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .modal-caption h4 {
            font-family: 'Fredoka', sans-serif;
            font-size: 1.4rem;
            color: #f7d070;
            margin-bottom: 6px;
        }

        .modal-caption p {
            font-size: 0.95rem;
            color: #cbd5e1;
        }

        /* --- STYLISH EDITORIAL TABLE OF CONTENT --- */
        .toc-section {
