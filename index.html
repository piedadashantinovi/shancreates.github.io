<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piedad's Creative Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- GLOBAL CONFIGURATION --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #1a0813; /* Elegant deep burgundy backdrop */
            background-image: radial-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 0);
            background-size: 24px 24px;
            color: #e6dfd3;
            font-family: 'Quicksand', sans-serif;
            padding: 10px;
            display: flex;
            justify-content: center;
        }

        .portfolio-wrapper {
            width: 100%;
            max-width: 850px;
            display: flex;
            flex-direction: column;
            gap: 50px;
            padding: 20px 10px;
        }

        /* --- HERO HEADER DESIGN --- */
        .hero-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            padding: 20px 0;
        }

        .main-title {
            font-family: 'Fredoka', sans-serif;
            font-size: 4.5rem;
            line-height: 0.85;
            color: #ec527b; /* Playful pink */
            font-weight: 700;
            text-shadow: 3px 3px 0px #fff;
        }

        .highlight-title {
            color: #fff;
            text-shadow: 3px 3px 0px #ec527b;
        }

        .tagline {
            font-size: 1.2rem;
            font-style: italic;
            color: #f7d070; /* Pastel gold text */
            margin-top: 10px;
        }

        /* Sticker House Artwork Placeholder */
        .house-graphic {
            width: 140px;
            position: relative;
        }
        .roof {
            width: 0; height: 0;
            border-left: 70px solid transparent;
            border-right: 70px solid transparent;
            border-bottom: 50px solid #ec527b;
        }
        .house-body {
            width: 120px; height: 90px;
            background: #fffdf9;
            margin: 0 auto;
            border-radius: 0 0 8px 8px;
            padding: 15px;
            position: relative;
        }
        .door {
            width: 25px; height: 45px;
            background: #ec527b;
            position: absolute;
            bottom: 0; right: 20px;
            border-radius: 4px 4px 0 0;
        }
        .window {
            width: 35px; height: 30px;
            border: 3px solid #ec527b;
            position: absolute;
            top: 20px; left: 15px;
        }

        /* --- INTRODUCTION SECTION GRID --- */
        .intro-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }

        @media(min-width: 650px) {
            .intro-grid { grid-template-columns: 280px 1fr; }
        }

        /* Scrapbook Photo Frame */
        .photo-frame {
            background: #f7d070;
            padding: 16px;
            border-radius: 24px;
            position: relative;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            transform: rotate(-2deg);
        }

        .profile-image {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 16px;
            border: 4px solid #fff;
        }

        /* Overlapping Labels */
        .sticker {
