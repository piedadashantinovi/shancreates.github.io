<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHAN | Creative Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- GLOBAL SETUP --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        body {
            background-color: #1a0813;
            background-image: radial-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 0);
            background-size: 30px 30px;
            color: #e6dfd3;
            font-family: 'Quicksand', sans-serif;
            padding-top: 140px; /* Space for fixed navbar */
            padding-bottom: 60px;
            overflow-x: hidden;
            width: 100%;
        }

        .portfolio-wrapper {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 80px;
            padding: 0 24px;
        }

        /* --- TOP NAVIGATION TAB BAR --- */
        .modern-nav-bar {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%; 
            max-width: 1200px; 
            background: rgba(26, 8, 19, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 50px; 
            padding: 14px 40px; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 9999;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
        }

        .nav-brand-logo {
            font-family: 'Fredoka', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            color: #f7d070;
            text-decoration: none;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .nav-links-cluster {
            display: flex;
            gap: 8px;
        }

        .nav-tab-link {
            text-decoration: none;
            font-family: 'Fredoka', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            color: #cbd5e1;
            padding: 10px 22px;
            border-radius: 30px;
            transition: all 0.2s ease;
        }

        .nav-tab-link:hover, .nav-tab-link.active-tab {
            color: #fff;
            background: #ec527b;
        }

        /* --- HERO --- */
        .hero-section {
            position: relative;
            background: linear-gradient(to right, #240d1e 50%, #1a0813 50%); 
            border-radius: 24px;
            padding: 80px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 40px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.04);
            min-height: 320px;
        }

        .hero-bg-watermark {
            position: absolute;
            font-family: 'Fredoka', sans-serif;
            font-size: 12rem;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.015);
            letter-spacing: 15px;
            line-height: 1;
            bottom: -30px;
            left: 5%;
            user-select: none;
            pointer-events: none;
            z-index: 1;
        }

        .logo-area {
            flex: 1;
            min-width: 280px;
            position: relative;
            z-index: 2;
        }

        .main-title {
            font-family: 'Fredoka', sans-serif;
            font-size: 4.8rem;
            line-height: 1;
            color: #ec527b; 
            font-weight: 700;
            text-shadow: 4px 4px 0px #fff;
            letter-spacing: -1px;
        }

        .tagline {
            font-size: 1.3rem;
            font-style: italic;
            color: #f7d070; 
            margin-top: 14px;
            font-weight: 500;
        }

        .tech-matrix-visual {
            width: 180px;
            height: 120px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            position: relative;
            flex-shrink: 0;
            z-index: 2;
        }

        .matrix-node {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 8px;
        }

        .matrix-node.node-glow-pink {
            background: #ec527b;
            border-color: #fff;
            box-shadow: 0 0 20px rgba(236, 82, 123, 0.7);
        }

        .matrix-node.node-glow-gold {
            background: #f7d070;
            border-color: #fff;
            box-shadow: 0 0 20px rgba(247, 208, 112, 0.7);
        }

        /* --- INTRODUCTION SECTION GRID --- */
        .intro-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 50px;
            align-items: start;
        }

        @media(min-width: 850px) {
            .intro-grid { grid-template-columns: 320px 1fr; }
        }

        .photo-frame {
            background: #f7d070;
            padding: 20px;
            border-radius: 4px; 
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            transform: rotate(-2deg);
            transition: transform 0.3s ease;
        }

        .photo-frame:hover {
            transform: rotate(0deg) scale(1.02);
        }

        .profile-image {
            width: 100%;
            height: auto;
            display: block;
            border: 4px solid #fff;
        }

        .sticker {
            position: absolute;
            font-family: 'Fredoka', sans-serif;
            font-size: 0.85rem;
            font-weight: bold;
            padding: 6px 14px;
            border-radius: 30px;
            border: 2px solid #fff;
        }
        .tag-blue { background: #5bc0be; color: #fff; bottom: 45px; left: -15px; transform: rotate(-8deg); }
        .tag-pink { background: #ec527b; color: #fff; bottom: 12px; right: -10px; transform: rotate(10deg); }

        .connect-panel {
            margin-top: 40px;
        }

        .connect-headline {
            font-family: 'Fredoka', sans-serif;
            font-size: 1.4rem;
            color: #f7d070;
            margin-bottom: 12px;
        }

        .connect-subtext {
            font-size: 0.9rem;
            line-height: 1.6;
            color: #cbd5e1;
            margin-bottom: 25px;
        }

        .contact-details-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 25px;
        }

        .contact-item-row {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .contact-meta-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #ec527b;
            font-weight: 700;
        }

        .contact-meta-value {
            font-size: 0.95rem;
