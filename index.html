<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piedad's Creative Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        /* --- GLOBAL CONFIGURATION --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #1a0813; /* Elegant deep burgundy backdrop */
            background-image: radial-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 0);
            background-size: 24px 24px;
            color: #e6dfd3;
            font-family: 'Quicksand', sans-serif;
            padding: 10px;
            display: flex;
            justify-content: center;
        }

        .portfolio-wrapper {
            width: 100%;
            max-width: 850px;
            display: flex;
            flex-direction: column;
            gap: 50px;
            padding: 20px 10px;
        }

        /* --- HERO HEADER DESIGN --- */
        .hero-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            padding: 20px 0;
        }

        .main-title {
            font-family: 'Fredoka', sans-serif;
            font-size: 4.5rem;
            line-height: 0.85;
            color: #ec527b; /* Playful pink */
            font-weight: 700;
            text-shadow: 3px 3px 0px #fff;
        }

        .highlight-title {
            color: #fff;
            text-shadow: 3px 3px 0px #ec527b;
        }

        .tagline {
            font-size: 1.2rem;
            font-style: italic;
            color: #f7d070; /* Pastel gold text */
            margin-top: 10px;
        }

        /* Sticker House Artwork Placeholder */
        .house-graphic {
            width: 140px;
            position: relative;
        }
        .roof {
            width: 0; height: 0;
            border-left: 70px solid transparent;
            border-right: 70px solid transparent;
            border-bottom: 50px solid #ec527b;
        }
        .house-body {
            width: 120px; height: 90px;
            background: #fffdf9;
            margin: 0 auto;
            border-radius: 0 0 8px 8px;
            padding: 15px;
            position: relative;
        }
        .door {
            width: 25px; height: 45px;
            background: #ec527b;
            position: absolute;
            bottom: 0; right: 20px;
            border-radius: 4px 4px 0 0;
        }
        .window {
            width: 35px; height: 30px;
            border: 3px solid #ec527b;
            position: absolute;
            top: 20px; left: 15px;
        }

        /* --- INTRODUCTION SECTION GRID --- */
        .intro-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }

        @media(min-width: 650px) {
            .intro-grid { grid-template-columns: 280px 1fr; }
        }

        /* Scrapbook Photo Frame */
        .photo-frame {
            background: #f7d070;
            padding: 16px;
            border-radius: 24px;
            position: relative;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            transform: rotate(-2deg);
        }

        .profile-image {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 16px;
            border: 4px solid #fff;
        }

        /* Overlapping Labels */
        .sticker {
            position: absolute;
            font-family: 'Fredoka', sans-serif;
            font-size: 0.8rem;
            font-weight: bold;
            padding: 6px 12px;
            border-radius: 30px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
            border: 2px solid #fff;
        }
        .tag-blue { background: #5bc0be; color: #fff; bottom: 40px; left: -10px; transform: rotate(-8deg); }
        .tag-pink { background: #ec527b; color: #fff; bottom: 10px; right: -5px; transform: rotate(10deg); }

        .connect-panel {
            margin-top: 25px;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 16px;
        }

        .connect-btn {
            background: #ec527b;
            color: white;
            font-family: 'Fredoka', sans-serif;
            padding: 8px 16px;
            border-radius: 30px;
            text-align: center;
            font-weight: bold;
            font-size: 0.95rem;
            margin-bottom: 12px;
            box-shadow: 0 4px 0px #ba3559;
        }

        .contact-links {
            list-style: none;
            font-size: 0.9rem;
            display: flex;
            flex-direction: column;
            gap: 8px;
            color: #cbd5e1;
        }

        /* Typography and Layout elements */
        .greet-title {
            font-family: 'Fredoka', sans-serif;
            font-size: 4.5rem;
            color: #f7d070;
            line-height: 1;
            margin-bottom: 15px;
        }

        .bio-text {
            font-size: 1.05rem;
            line-height: 1.6;
            color: #f1f5f9;
            text-align: justify;
        }

        .divider {
            height: 2px;
            background: rgba(255,255,255,0.1);
            margin: 25px 0;
        }

        .section-subtitle {
            font-family: 'Fredoka', sans-serif;
            font-size: 1.6rem;
            color: #fff;
            margin-bottom: 15px;
        }

        /* Creative Skill Badges rows */
        .skills-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 25px;
        }

        .tool-badge {
            font-family: 'Fredoka', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            padding: 6px 16px;
            border-radius: 12px;
            color: #1a0813;
            box-shadow: 0 4px 0px rgba(0,0,0,0.15);
        }
        .badge-video { background: #f8a488; }
        .badge-design { background: #a8dadc; }
        .badge-canva { background: #e9c46a; }
        .badge-capcut { background: #f4a261; }

        .personal-skills-zone {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        @media(min-width: 500px) {
            .personal-skills-zone { grid-template-columns: 1fr 1fr; }
        }

        .skill-col h4 {
            font-family: 'Fredoka', sans-serif;
            color: #f7d070;
            margin-bottom: 8px;
            font-size: 1.15rem;
        }

        .skill-col ul {
            list-style-position: inside;
            color: #cbd5e1;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        /* --- 3D PROJECTS CAROUSEL --- */

            position: relative;
            padding: 40px 0;
            overflow: hidden;
        }

        .section-title-center {

            color: #f7d070;
            margin-bottom: 40px;
            text-align: center;
        }

        .carousel-container {
            display: flex;

            justify-content: center;

            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            height: 410px;
            perspective: 1000px;
        }

        .carousel-track {
            position: relative;
            width: 100%;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        .project-card {
            position: absolute;
            width: 340px;
            height: 385px;
            border-radius: 24px;
            padding: 26px;
            box-shadow: 0 12px 24px rgba(0,0,0,0.3);
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.5s ease, z-index 0.5s ease;
            cursor: pointer;
            user-select: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
        }

        .pink-card {
            background: #ec527b;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-top: 3px solid rgba(255, 255, 255, 0.6);
        }

        .window-card {
            background: #2b1424;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-top: 3px solid #ec527b;
            color: #e6dfd3;
        }

        .card-inner {
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .card-header-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 6px;
        }

        .card-inner h5 {
            font-family: 'Fredoka', sans-serif;
            font-size: 1.15rem;
            line-height: 1.3;
            font-weight: 600;
        }

        .card-year-badge {
            font-family: 'Fredoka', sans-serif;
            font-size: 0.75rem;
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 20px;
            white-space: nowrap;
        }
        .pink-card .card-year-badge {
            background: rgba(255, 255, 255, 0.25);
            color: #fff;
        }
        .window-card .card-year-badge {
            background: #ec527b;
            color: #fff;
        }

        .card-role-line {
            font-size: 0.78rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .card-role-line::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            display: inline-block;
        }
        .pink-card .card-role-line { color: #f7d070; }
        .pink-card .card-role-line::before { background: #f7d070; }
        
        .window-card .card-role-line { color: #ec527b; }
        .window-card .card-role-line::before { background: #ec527b; }

        .card-inner p.card-desc {
            font-size: 0.86rem;
            line-height: 1.55;
            opacity: 0.95;
            text-align: justify;
            margin-bottom: auto;
        }

        .card-tech-wrapper {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 15px;
            padding-top: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        .pink-card .card-tech-wrapper { border-top-color: rgba(255, 255, 255, 0.2); }

        .tech-pill {
            font-size: 0.72rem;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 6px;
            letter-spacing: 0.3px;
        }
        .pink-card .tech-pill { background: rgba(0, 0, 0, 0.15); color: #fff; }
        .window-card .tech-pill { background: rgba(236, 82, 123, 0.1); color: #ec527b; }

        .card-motif {
            position: absolute;
            bottom: -10px;
            right: -5px;
            font-family: monospace;
            font-size: 5.5rem;
            font-weight: 900;
            user-select: none;
            pointer-events: none;
            z-index: 1;
            line-height: 1;
        }
        .pink-card .card-motif { color: rgba(255, 255, 255, 0.05); }
        .window-card .card-motif { color: rgba(255, 255, 255, 0.02); }

        .project-card.active {
            transform: translateX(0) scale(1.05) translateZ(50px);
            opacity: 1;
            z-index: 5;
            pointer-events: auto;
            box-shadow: 0 15px 35px rgba(236, 82, 123, 0.25);
        }
